# ---------------------------------------------------------------------------
# 6. Question → Form Option Mapping
# Maps internal answer keys (used in the matrix above) to the exact text
# strings that appear on the Google Form. Update these when you attach
# the form HTML.
# ---------------------------------------------------------------------------
questions:
  # Age question
  age:
    label: "Jūsų amžius"           # Form question label (for logging)
    option_map:
      "18-24": "18–24"
      "25-34": "25–34"
      "35-44": "35–44"
      "45-54": "45–54"

  # Income bracket question
  income:
    label: "Jūsų mėnesinės pajamos"
    option_map:
      "under-800":  "iki 800 €"
      "801-1500":   "801–1500 €"
      "1501-2500":  "1501–2500 €"
      "2501-4000":  "2501–4000 €"
      "4000+":      "daugiau nei 4000 €"

  # Current investing status
  invests_now:
    label: "Ar šiuo metu investuojate į finansines priemones?"
    option_map:
      "yes": "Taip"
      "no":  "Ne"

  # IMPORTANT: "neinvestuoju" is tightly controlled via neinvestuoju_max_fraction
  first_invest:
    label: "Kada pirmą kartą investavote į finansines priemones?"
    option_map:
      last_year:           "Prieš mažiau nei metus"
      one_to_three_years:  "Prieš 1–3 metus"
      three_to_five_years: "Prieš 3–5 metus"
      over_five_years:     "Prieš daugiau nei 5 metus"
      neinvestuoju:        "Neinvestuoju"   # kept rare — see constraints above

  # Risk tolerance
  risk:
    label: "Koks jūsų investicijų rizikos tolerancijos lygis?"
    option_map:
      no_risk:       "Jokia rizika nepriimtina"
      below_average: "Žemesnė nei vidutinė rizika"
      average:       "Vidutinė rizika"
      above_average: "Aukštesnė nei vidutinė rizika"
      high:          "Aukšta rizika"

  # Reaction to 20 % portfolio drop
  drop_reaction:
    label: "Jei jūsų investicijos per mėnesį sumažėtų 20 %, ką darytumėte?"
    option_map:
      sell_all:  "Parduočiau viską"
      sell_some: "Parduočiau dalį"
      hold:      "Nieko nedaryčiau, laukčiau"
      buy_more:  "Pirkčiau daugiau"

  # Financial literacy (self-assessed, 1–3 scale mapped to form options)
  literacy:
    label: "Kaip vertinate savo finansinį raštingumą?"
    option_map:
      low:    "Žemas"
      medium: "Vidutinis"
      high:   "Aukštas"
    # Score thresholds: <1.7 → low, 1.7–2.4 → medium, >=2.4 → high
    score_thresholds:
      medium_min: 1.7
      high_min: 2.4
    # Jitter: ±this fraction of the mean is added as noise (0 = no jitter)
    literacy_jitter: 0.25

# ---------------------------------------------------------------------------
# 7. Logging
# ---------------------------------------------------------------------------
logging:
  level: "INFO"            # DEBUG | INFO | WARNING | ERROR
  log_file: "bot.log"      # Set to null to disable file logging
  print_answer_summary: true  # Print each generated answer profile to console
