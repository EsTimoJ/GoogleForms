# =============================================================================
# Google Forms Bot — Configuration
# =============================================================================

# ---------------------------------------------------------------------------
# 1. Target Form
# ---------------------------------------------------------------------------
form:
  # Full URL of the Google Form to fill
  url: "https://docs.google.com/forms/d/YOUR_FORM_ID/viewform"

# ---------------------------------------------------------------------------
# 2. Submission Rate
# Complete 4–8 answers per hour to avoid suspicion. The bot picks a random
# delay within [min_delay_sec, max_delay_sec] between each submission.
# ---------------------------------------------------------------------------
rate:
  answers_per_hour_min: 4      # Minimum completions per hour
  answers_per_hour_max: 8      # Maximum completions per hour
  # Derived: min delay = 3600/max, max delay = 3600/min (seconds)
  # You may override those derived values explicitly:
  min_delay_sec: null           # null = auto-compute from answers_per_hour
  max_delay_sec: null           # null = auto-compute from answers_per_hour
  # Extra micro-delay (seconds) between individual field interactions
  field_interaction_delay_min: 0.4
  field_interaction_delay_max: 1.8

# ---------------------------------------------------------------------------
# 2b. Schedule & Burst
# The bot only submits during active hours. Outside this window it sleeps.
# A per-hour "burst" chance simulates natural participation spikes.
# ---------------------------------------------------------------------------
schedule:
  active_hours_start: 8        # Begin submissions at 08:00
  active_hours_end: 22         # Stop submissions at 22:00 (no night activity)
  # Per-hour probability that submissions run at an elevated rate.
  burst_chance: 0.10           # 10 % chance each new clock-hour
  burst_multiplier: 3          # During a burst the rate is multiplied by this

# ---------------------------------------------------------------------------
# 3. Browser / Selenium
# ---------------------------------------------------------------------------
browser:
  headless: true                # true = no visible window (production)
  window_width: 1280
  window_height: 900
  # Path to a ChromeDriver binary. Leave null to use webdriver-manager auto.
  chromedriver_path: null
  # Disable automation flags to reduce bot fingerprint
  disable_automation_flags: true
  # Rotate user-agent strings (list below)
  rotate_user_agent: true
  user_agents:
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (Macintosh; Intel Mac OS X 14_3) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36"
    - "Mozilla/5.0 (Windows NT 10.0; Win64; x64; rv:123.0) Gecko/20100101 Firefox/123.0"

# ---------------------------------------------------------------------------
# 4. Constraints on Specific Answers
# ---------------------------------------------------------------------------
constraints:
  # "Kada pirmą kartą investavote į finansines priemones?"
  # "neinvestuoju" (never invested) must stay rare so results remain useful.
  # This is the MAXIMUM fraction of submissions that may choose "neinvestuoju".
  neinvestuoju_max_fraction: 0.05    # 5 % ceiling across all submissions

# ---------------------------------------------------------------------------
# 5. Answer Matrix  (core tendency data from 120 genuine responses)
# Each profile is identified by age_group + income_bracket.
# Fields:
#   weight              — relative sampling weight (larger = more often picked)
#   invest_prob         — probability this person currently invests (0–1)
#   first_invest_options — weighted map: answer_key -> weight
#                          Used for "Kada pirmą kartą investavote?"
#                          Keys must match the option_map in questions section.
#   risk_options        — weighted map for risk tolerance question
#   drop_options        — weighted map for "reaction to 20 % market drop"
#   literacy_mean       — mean financial literacy score (1–3 scale, informational)
# ---------------------------------------------------------------------------
matrix:
  - id: young_mid_income          # Profile 1 — Young Starter
    label: "18–24 / €801–1500"
    age_group: "18-24"
    income_bracket: "801-1500"
    weight: 24
    invest_prob: 0.50
    first_invest_options:
      last_year: 3
      one_to_three_years: 3
      three_to_five_years: 2
      over_five_years: 2
